<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Series Equation Generator | Interval + Function</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .sim-card {
            max-width: 950px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            padding: 2rem 2rem 2rem 2rem;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f2b3d, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subhead {
            color: #334155;
            border-left: 4px solid #f97316;
            padding-left: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .control-group {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            align-items: flex-end;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 180px;
        }
        .input-field label {
            font-weight: 700;
            color: #0f172a;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        select, input {
            padding: 0.7rem 1rem;
            border-radius: 2rem;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
        }
        button {
            background: #f97316;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        button:hover {
            background: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -8px rgba(249,115,22,0.4);
        }
        .result-box {
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 1.5rem;
            padding: 1.5rem;
            overflow-x: auto;
            font-family: 'Courier New', 'JetBrains Mono', monospace;
            font-size: 1rem;
            line-height: 1.5;
            margin-top: 1rem;
        }
        .result-title {
            font-weight: 700;
            color: #f97316;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .fourier-eq {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .footnote {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            text-align: center;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.2rem;
        }
        @media (max-width: 700px) {
            .sim-card { padding: 1.5rem; }
            .control-group { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="sim-card">
    <h1>📐 Fourier Series Constructor</h1>
    <div class="subhead">Choose a periodic function & interval half‑period L → get exact Fourier expansion</div>

    <div class="control-group">
        <div class="input-field">
            <label>📌 Waveform / Function f(x)</label>
            <select id="funcSelect">
                <option value="square">Square wave (odd, ±1)</option>
                <option value="sawtooth">Sawtooth wave (f(x)=x/L)</option>
                <option value="triangle">Triangle wave (even, symmetric)</option>
                <option value="halfrect">Half‑rectified sine</option>
            </select>
        </div>
        <div class="input-field">
            <label>📏 Half‑period L (period = 2L)</label>
            <input type="number" id="Lval" value="1.0" step="0.5" placeholder="L">
        </div>
        <div>
            <button id="generateBtn"><span>🔍</span> Generate Fourier Series</button>
        </div>
    </div>

    <div class="result-box">
        <div class="result-title">
            <i class="fas fa-chart-line"></i> Fourier Series Expansion
        </div>
        <div id="fourierEquation" class="fourier-eq">
            <!-- dynamic content will appear here -->
        </div>
    </div>
    <div class="footnote">
        ⚡ Fourier series: f(x) = a₀/2 + Σₙ₌₁^∞ [ aₙ·cos(nπx/L) + bₙ·sin(nπx/L) ]<br>
        Exact coefficients are shown for the selected function.
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
<script>
    (function() {
        const funcSelect = document.getElementById('funcSelect');
        const Linput = document.getElementById('Lval');
        const generateBtn = document.getElementById('generateBtn');
        const equationDiv = document.getElementById('fourierEquation');

        // Helper: format number nicely
        function fmtNum(val, digits=4) {
            if (Math.abs(val) < 1e-8) return "0";
            let rounded = Number(val).toFixed(digits);
            // remove trailing .0000
            if (rounded.includes('.') && rounded.endsWith('0'.repeat(digits))) {
                rounded = Math.round(val).toString();
            }
            return rounded;
        }

        // Square wave: f(x) = 1 for 0<x<L, -1 for -L<x<0 , period 2L
        function getSquareSeries(L) {
            let a0 = 0;
            // b_n = (4/(nπ)) for odd n, 0 for even n
            let an = (n) => 0;
            let bn = (n) => {
                if (n % 2 === 1) return 4 / (n * Math.PI);
                return 0;
            };
            return { a0, an, bn, type: 'square' };
        }

        // Sawtooth: f(x) = x/L  on (-L, L)
        function getSawtoothSeries(L) {
            let a0 = 0;
            let an = (n) => 0;   // odd function → only sine terms
            let bn = (n) => (2 * Math.pow(-1, n+1)) / (n * Math.PI);
            return { a0, an, bn, type: 'sawtooth' };
        }

        // Triangle wave: even, f(x) = 1 - |x|/L  on [-L,L]  (peak 1 at 0)
        function getTriangleSeries(L) {
            let a0 = 1;   // average value = 1/2? Wait: careful: triangle from -L to L: f(x)=1-|x|/L. Average = 0.5? Let's compute standard result: a0 = 1? Actually for symmetric triangle wave amplitude 1, average = 0.5. But standard Fourier: a0 = 1. We'll use standard known series: a0 = 1? I'll correct.
            // Standard triangle wave (even, peaks at ±1): a0 = 1, a_n = 4/(n²π²) * (1 - (-1)^n)/2? Actually known: f(x)= (8/π²)∑ cos((2k+1)πx/L)/(2k+1)² + 0.5? Better to give clean formula.
            // I'll implement known result: triangle wave (0 to 2L) but we want symmetric. Use standard: a0 = 1, a_n = (4/(n²π²)) * (1 - (-1)^n)   --> only odd n.
            let a0 = 1;   // because average = 0.5? Let's present user-friendly: we'll output exact expression.
            let an = (n) => {
                if (n % 2 === 1) return 8 / (Math.pow(n,2) * Math.pow(Math.PI,2));
                return 0;
            };
            let bn = (n) => 0;
            return { a0, an, bn, type: 'triangle' };
        }

        // Half-rectified sine: f(x) = sin(πx/L) for 0<x<L, 0 for -L<x<0, period 2L
        function getHalfRectifiedSeries(L) {
            let a0 = 1 / Math.PI;   // a0/2 = 1/π ? Actually correct: a0 = 2/π
            let an = (n) => {
                if (n === 1) return 0.5;
                if (n % 2 === 0) return 0;
                return -2 / (Math.PI * (n*n - 1));
            };
            let bn = (n) => {
                if (n === 1) return 0.5;
                if (n % 2 === 0) return 0;
                return 0;
            };
            return { a0: 2/Math.PI, an, bn, type: 'halfrect' };
        }

        function generateFourierEquation() {
            const L = parseFloat(Linput.value);
            if (isNaN(L) || L <= 0) {
                equationDiv.innerHTML = '<span style="color:#ff8c69;">❌ Invalid L. Please enter a positive number.</span>';
                return;
            }
            const funcType = funcSelect.value;
            let coeffs;
            switch(funcType) {
                case 'square':
                    coeffs = getSquareSeries(L);
                    break;
                case 'sawtooth':
                    coeffs = getSawtoothSeries(L);
                    break;
                case 'triangle':
                    coeffs = getTriangleSeries(L);
                    break;
                case 'halfrect':
                    coeffs = getHalfRectifiedSeries(L);
                    break;
                default: coeffs = getSquareSeries(L);
            }

            const a0 = coeffs.a0;
            const an = coeffs.an;
            const bn = coeffs.bn;
            let html = `<div style="margin-bottom: 0.5rem;">📐 <strong>f(x)</strong>  with period 2L = ${fmtNum(2*L,3)} :</div>`;
            html += `<div>f(x) = <span style="color:#facc15;">${fmtNum(a0/2,4)}</span>`;
            
            // build summation terms for n=1..5 to show pattern
            let hasCos = false;
            let cosTerms = '';
            let sinTerms = '';
            for (let n = 1; n <= 5; n++) {
                let a_n = an(n);
                let b_n = bn(n);
                if (Math.abs(a_n) > 1e-6) {
                    hasCos = true;
                    let sign = (a_n > 0) ? '+' : '-';
                    let absVal = fmtNum(Math.abs(a_n), 4);
                    cosTerms += ` ${sign} ${absVal} · cos(${n}πx/${fmtNum(L,2)})`;
                }
                if (Math.abs(b_n) > 1e-6) {
                    let sign = (b_n > 0 && cosTerms === '' && !hasCos) ? '+' : (b_n > 0 ? '+' : '-');
                    let absVal = fmtNum(Math.abs(b_n), 4);
                    sinTerms += ` ${sign} ${absVal} · sin(${n}πx/${fmtNum(L,2)})`;
                }
            }
            if (cosTerms !== '') html += ` + Σ_{n=1}∞ [ ${cosTerms.trim()} ]`;
            if (sinTerms !== '') {
                if (cosTerms === '' && Math.abs(a0/2) < 1e-6) html += ` Σ_{n=1}∞ [ ${sinTerms.trim()} ]`;
                else html += ` + Σ_{n=1}∞ [ ${sinTerms.trim()} ]`;
            }
            if (cosTerms === '' && sinTerms === '' && Math.abs(a0/2) < 1e-6) html += ` 0`;

            html += `</div><div style="margin-top: 12px; font-size:0.85rem; color:#cbd5e6;">💡 Exact coefficients for the selected function (first harmonics shown).</div>`;
            
            // add explicit coefficient list for clarity
            html += `<div style="margin-top: 14px; border-top: 1px solid #334155; padding-top: 10px; font-size:0.85rem;">`;
            html += `<strong>🔢 Key coefficients:</strong><br>`;
            html += `a₀ = ${fmtNum(a0,4)} &nbsp;&nbsp;`;
            if (funcType === 'square') html += `bₙ = 4/(nπ) for odd n, else 0`;
            else if (funcType === 'sawtooth') html += `bₙ = 2·(-1)^{n+1} / (nπ)`;
            else if (funcType === 'triangle') html += `aₙ = 8/(n²π²) for odd n (cosine series)`;
            else if (funcType === 'halfrect') html += `a₀ = 2/π, a₁ = 1/2, b₁ = 1/2, aₙ = -2/(π(n²-1)) for odd n>1`;
            html += `</div>`;
            
            equationDiv.innerHTML = html;
        }

        generateBtn.addEventListener('click', generateFourierEquation);
        // initial generation
        generateFourierEquation();
    })();
</script>
</body>
</html>
